<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Murdoku Clone</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, useRef } = React;
    const AVATAR_COLORS = ['#fca5a5', '#fdba74', '#fcd34d', '#86efac', '#93c5fd', '#c4b5fd', '#f0abfc'];

// ============================================================================
// 1. MOTOR DE DADOS E TOPOLOGIA ESPACIAL
// ============================================================================

const DIFFICULTIES = ['Very Easy', 'Easy', 'Medium', 'Hard', 'Expert'];

const ROOM_COLORS = {
  entrance: '#a78bfa', // Purple
  waiting: '#818cf8',  // Indigo
  main: '#f472b6',     // Pink
  staff: '#38bdf8',    // Sky
  storage: '#34d399',  // Emerald
  office: '#fbbf24',   // Amber
};

// Geração Vetorial de Avatares (SVG Inline para performance e independência de assets externos)
const AvatarGraphic = ({ seed, trait, className }) => {
  const skin = ['#fde047', '#fed7aa', '#ffedd5', '#f3cfaa', '#d97706'];
  const bgColor = AVATAR_COLORS[seed % AVATAR_COLORS.length];
  const skinColor = skin[seed % skin.length];
  
  return (
    <svg viewBox="0 0 100 100" className={`w-full h-full rounded bg-[${bgColor}] border-2 border-slate-800 ${className}`} style={{backgroundColor: bgColor}}>
      <rect width="100" height="100" fill={bgColor} />
      {/* Corpo */}
      <path d="M20 100 Q 20 60 50 60 Q 80 60 80 100" fill={skinColor} stroke="#1e293b" strokeWidth="4" />
      {/* Camisa */}
      <path d="M20 100 Q 20 70 50 70 Q 80 70 80 100" fill="#ffffff" stroke="#1e293b" strokeWidth="4" opacity="0.8"/>
      {/* Cabeça */}
      <circle cx="50" cy="40" r="20" fill={skinColor} stroke="#1e293b" strokeWidth="4" />
      {/* Traits Específicos */}
      {trait === 'glasses' && (
        <g stroke="#1e293b" strokeWidth="3" fill="none">
          <circle cx="42" cy="38" r="6" /><circle cx="58" cy="38" r="6" />
          <path d="M 48 38 L 52 38 M 36 38 L 28 38 M 64 38 L 72 38" />
        </g>
      )}
      {trait === 'beard' && (
        <path d="M 32 45 Q 50 65 68 45 Q 50 70 32 45" fill="#475569" stroke="#1e293b" strokeWidth="2" />
      )}
      {trait === 'bald' ? null : (
        <path d="M 28 40 Q 50 15 72 40 Q 60 20 50 20 Q 40 20 28 40" fill="#475569" stroke="#1e293b" strokeWidth="2" />
      )}
    </svg>
  );
};

// Ícones de Mobiliário em SVG (Utilizando Assets Oficiais)
const FurnitureIcon = ({ type }) => {
  const assetMap = {
    'shelf': 'assets/obj_shelf-DW4s9BDU.svg',
    'barrel': 'assets/obj_barrel-BrivFWNA.svg',
    'tv': 'assets/obj_tv-B-td_p6V.svg',
    'plant': 'assets/obj_plant-lqsU7Mb1.svg',
    'grass': 'assets/texture_floor_grass-n85FOBUF.svg',
    'box': 'assets/obj_crate-C9EwUpcm.svg'
  };

  const src = assetMap[type];
  if (!src) return null;

  return (
    <div className="w-full h-full p-2 flex items-center justify-center">
      <img 
        src={src} 
        alt={type} 
        className="w-full h-full object-contain filter drop-shadow-[2px_2px_0px_rgba(15,23,42,0.8)]"
        title={type.charAt(0).toUpperCase() + type.slice(1)}
      />
    </div>
  );
};

// ============================================================================
// 2. BASE DE DADOS DE IDENTIDADES E MAPAS
// ============================================================================

const ALL_CHARACTERS = [
  { id: 'A', name: 'Adonis', trait: 'glasses' },
  { id: 'B', name: 'Bryson', trait: 'bald' },
  { id: 'C', name: 'Craig', trait: 'beard' },
  { id: 'D', name: 'Dylan', trait: 'glasses' },
  { id: 'E', name: 'Edison', trait: 'bald' },
  { id: 'F', name: 'Floyd', trait: 'beard' },
  { id: 'G', name: 'Grant', trait: 'beard' },
  { id: 'H', name: 'Vasiliy', trait: 'bald', isVictim: true },
];

const MAP_TEMPLATES = {
  easy: {
    size: 4,
    rooms: [
      { id: 'entrance', name: 'Entrance', rect: { x: 0, y: 0, w: 2, h: 4 } },
      { id: 'main', name: 'Main Area', rect: { x: 2, y: 0, w: 2, h: 4 } }
    ],
    items: [
      { x: 0, y: 0, type: 'shelf' }, { x: 3, y: 3, type: 'plant' }, { x: 1, y: 2, type: 'barrel' }
    ]
  },
  medium: {
    size: 6,
    rooms: [
      { id: 'storage', name: 'Storage', rect: { x: 0, y: 0, w: 2, h: 2 } },
      { id: 'staff', name: 'Staff Room', rect: { x: 2, y: 0, w: 4, h: 2 } },
      { id: 'main', name: 'Main Area', rect: { x: 0, y: 2, w: 4, h: 3 } },
      { id: 'entrance', name: 'Entrance', rect: { x: 4, y: 2, w: 2, h: 3 } },
      { id: 'waiting', name: 'Waiting Area', rect: { x: 0, y: 5, w: 6, h: 1 } }
    ],
    items: [
      { x: 1, y: 0, type: 'box' }, { x: 4, y: 0, type: 'tv' },
      { x: 2, y: 2, type: 'shelf' }, { x: 5, y: 3, type: 'barrel' },
      { x: 3, y: 5, type: 'plant' }, { x: 0, y: 3, type: 'grass' }
    ]
  }
};

// ============================================================================
// 3. MOTOR DE GERAÇÃO ISOMÓRFICA DE PUZZLES (CSP)
// ============================================================================

// Sementes matemáticas pré-validadas (garantem solução única)
const LOGIC_SEEDS = {
  easy: [
    {
      target: { A: {x:0, y:1}, B: {x:1, y:3}, C: {x:3, y:0}, D: {x:2, y:2} },
      clueGenerators: [
        (c) => ({ text: `He was beside the shelf in the ${c.A.room}.`, eval: p => p[c.A.id] ? isBeside(p[c.A.id], {x:0, y:0}) : null }),
        (c) => ({ text: `No one in his area had a ${c.B.trait}.`, eval: p => evaluateRoomExclusivity(p, c.B.id, c.B.trait, ALL_CHARACTERS, c.map) }),
        (c) => ({ text: `He was beside a plant.`, eval: p => p[c.C.id] ? isBeside(p[c.C.id], {x:3, y:3}) : null }),
        (c) => ({ text: `He was sitting on a barrel.`, eval: p => p[c.D.id] ? (p[c.D.id].x === 1 && p[c.D.id].y === 2) : null })
      ]
    }
  ],
  medium: [
    {
      target: { A: {x:4, y:3}, B: {x:1, y:1}, C: {x:2, y:2}, D: {x:3, y:0}, E: {x:0, y:3}, F: {x:5, y:5}, H: {x:2, y:5} },
      clueGenerators: [
        (c) => ({ text: `He was beside the barrel in the ${c.A.room}.`, eval: p => p[c.A.id] ? isBeside(p[c.A.id], {x:5, y:3}) : null }),
        (c) => ({ text: `No one in his area had a ${c.B.trait}.`, eval: p => evaluateRoomExclusivity(p, c.B.id, c.B.trait, ALL_CHARACTERS, c.map) }),
        (c) => ({ text: `He was sitting on a shelf.`, eval: p => p[c.C.id] ? (p[c.C.id].x === 2 && p[c.C.id].y === 2) : null }),
        (c) => ({ text: `He was beside a TV. He was alone.`, eval: p => p[c.D.id] ? (isBeside(p[c.D.id], {x:4, y:0}) && isRoomEmpty(p, c.D.id, c.map)) : null }),
        (c) => ({ text: `He was on the grass.`, eval: p => p[c.E.id] ? (p[c.E.id].x === 0 && p[c.E.id].y === 3) : null }),
        (c) => ({ text: `He was beside a plant.`, eval: p => p[c.F.id] ? isBeside(p[c.F.id], {x:3, y:5}) : null }),
        (c) => ({ text: `The Victim. He was alone with the murderer.`, eval: p => p[c.H.id] ? checkVictimCondition(p, c.H.id, c.map) : null })
      ]
    }
  ]
};

// Utilitários de Validação Espacial
const isBeside = (pos, target) => Math.abs(pos.x - target.x) <= 1 && Math.abs(pos.y - target.y) <= 1 && !(pos.x === target.x && pos.y === target.y);
const getRoomAt = (x, y, map) => map.rooms.find(r => x >= r.rect.x && x < r.rect.x + r.rect.w && y >= r.rect.y && y < r.rect.y + r.rect.h);
const evaluateRoomExclusivity = (placements, entityId, trait, allChars, map) => {
  if (!placements[entityId]) return null;
  const room = getRoomAt(placements[entityId].x, placements[entityId].y, map);
  if (!room) return false;
  
  for (let [id, pos] of Object.entries(placements)) {
    if (id !== entityId && getRoomAt(pos.x, pos.y, map)?.id === room.id) {
      const char = allChars.find(c => c.id === id);
      if (char && char.trait === trait) return false;
    }
  }
  return true;
};
const isRoomEmpty = (placements, entityId, map) => {
  if (!placements[entityId]) return null;
  const room = getRoomAt(placements[entityId].x, placements[entityId].y, map);
  for (let [id, pos] of Object.entries(placements)) {
    if (id !== entityId && getRoomAt(pos.x, pos.y, map)?.id === room.id) return false;
  }
  return true;
};
const checkVictimCondition = (placements, victimId, map) => {
  if (!placements[victimId]) return null;
  const room = getRoomAt(placements[victimId].x, placements[victimId].y, map);
  let countInRoom = 0;
  for (let [id, pos] of Object.entries(placements)) {
    if (getRoomAt(pos.x, pos.y, map)?.id === room.id) countInRoom++;
  }
  return countInRoom === 2; // Vítima + Assassino
};

// ============================================================================
// 4. CONTROLADOR PRINCIPAL DA APLICAÇÃO (REACT)
// ============================================================================

function MurdokuApp() {
  const [gameState, setGameState] = useState('menu'); // 'menu', 'playing', 'victory'
  const [difficulty, setDifficulty] = useState('Medium');
  const [levelData, setLevelData] = useState(null);
  
  const [placements, setPlacements] = useState({});
  const [notes, setNotes] = useState({}); // Stores array of entity IDs for notes per cell key "x,y"
  const [selectedEntity, setSelectedEntity] = useState(null);
  const pressTimer = useRef(null);

  // Inicializador de Nível (O(1) Isomorphic Mapper)
  const startLevel = (diff) => {
    setDifficulty(diff);
    
    const logicKey = (diff === 'Very Easy' || diff === 'Easy') ? 'easy' : 'medium';
    const mapTemplate = MAP_TEMPLATES[logicKey];
    const seeds = LOGIC_SEEDS[logicKey];
    const seed = seeds[Math.floor(Math.random() * seeds.length)]; 
    
    const charsObj = {};
    const availableChars = [...ALL_CHARACTERS.filter(c => !c.isVictim)].sort(() => 0.5 - Math.random());
    const victimChar = ALL_CHARACTERS.find(c => c.isVictim);
    
    const context = { map: mapTemplate };
    let i = 0;
    
    for (let key in seed.target) {
      if (key === 'H') {
        charsObj[key] = { ...victimChar, room: getRoomAt(seed.target[key].x, seed.target[key].y, mapTemplate)?.name };
      } else {
        charsObj[key] = { ...availableChars[i], room: getRoomAt(seed.target[key].x, seed.target[key].y, mapTemplate)?.name };
        i++;
      }
      context[key] = charsObj[key];
    }

    const clues = seed.clueGenerators.map(gen => gen(context));
    
    const entities = Object.keys(seed.target).map((key, idx) => ({
      ...charsObj[key],
      abstractId: key,
      clue: clues[idx],
      isPlaced: false
    }));

    setLevelData({ map: mapTemplate, entities: entities, target: seed.target });
    
    setPlacements({});
    setNotes({});
    setSelectedEntity(null);
    setGameState('playing');
  };

  // Interações de Grelha e UI
  const handlePointerDown = (x, y) => {
    if (gameState === 'victory') return;
    pressTimer.current = setTimeout(() => {
      handleLongPress(x, y);
      pressTimer.current = null;
    }, 350); // 350ms para diferenciar click curto (nota) de press longo (colocar)
  };

  const handlePointerUp = (x, y) => {
    if (gameState === 'victory') return;
    if (pressTimer.current) {
      clearTimeout(pressTimer.current);
      pressTimer.current = null;
      handleShortClick(x, y);
    }
  };

  const handlePointerLeave = () => {
    if (pressTimer.current) {
      clearTimeout(pressTimer.current);
      pressTimer.current = null;
    }
  };

  const handleShortClick = (x, y) => {
    const existingEntityId = Object.keys(placements).find(id => placements[id].x === x && placements[id].y === y);

    if (existingEntityId) {
      setSelectedEntity(existingEntityId);
      return;
    }

    if (selectedEntity) {
      const cellKey = `${x},${y}`;
      setNotes(prev => {
        const cellNotes = prev[cellKey] || [];
        if (cellNotes.includes(selectedEntity)) {
          return { ...prev, [cellKey]: cellNotes.filter(id => id !== selectedEntity) };
        } else {
          return { ...prev, [cellKey]: [...cellNotes, selectedEntity] };
        }
      });
    }
  };

  const blockedCells = useMemo(() => {
    const blocked = new Set();
    Object.values(placements).forEach(pos => {
      for (let i = 0; i < levelData?.map?.size; i++) {
        if (i !== pos.x) blocked.add(`${i},${pos.y}`);
        if (i !== pos.y) blocked.add(`${pos.x},${i}`);
      }
    });
    return blocked;
  }, [placements, levelData]);

  const handleLongPress = (x, y) => {
    const existingEntityId = Object.keys(placements).find(id => placements[id].x === x && placements[id].y === y);

    if (selectedEntity) {
      setPlacements(prev => {
        const next = { ...prev };
        if (existingEntityId) delete next[existingEntityId];
        next[selectedEntity] = { x, y };
        return next;
      });
      setNotes(prev => {
        const nextNotes = { ...prev };
        for (let key in nextNotes) {
          nextNotes[key] = nextNotes[key].filter(id => id !== selectedEntity);
          if (nextNotes[key].length === 0) delete nextNotes[key];
        }
        return nextNotes;
      });
      setSelectedEntity(null);
    } else if (existingEntityId) {
      setPlacements(prev => {
        const next = { ...prev };
        delete next[existingEntityId];
        return next;
      });
      setSelectedEntity(existingEntityId);
    }
  };

  const handleTrayClick = (id) => {
    if (gameState === 'victory') return;
    if (selectedEntity === id) {
      setSelectedEntity(null);
    } else {
      setSelectedEntity(id);
    }
  };

  const handleClear = () => {
    setPlacements({});
    setNotes({});
    setSelectedEntity(null);
  };

  const handleSubmit = () => {
    if (Object.keys(placements).length !== levelData.entities.length) {
      alert("Operação negada: A topologia exige que todas as entidades sejam projetadas na grelha antes da validação.");
      return;
    }

    const isValid = levelData.entities.every(e => {
      const result = e.clue.eval(placements);
      return result === true;
    });

    if (isValid) {
      setGameState('victory');
    } else {
      // Animação de erro simples utilizando classes de estado local
      alert("Incongruência detetada: As restrições vetoriais não foram integralmente satisfeitas.");
    }
  };

  // ============================================================================
  // VIEWS (COMPONENTES DE RENDERIZAÇÃO)
  // ============================================================================

  if (gameState === 'menu') {
    return (
      <div className="min-h-screen bg-slate-200 font-sans flex flex-col items-center justify-center p-4">
        <div className="max-w-md w-full bg-white p-8 rounded-xl border-4 border-slate-900 shadow-[8px_8px_0px_#0f172a]">
          <h1 className="text-4xl font-black text-center mb-2 tracking-tight">MURDOKU</h1>
          <p className="text-center text-slate-500 font-bold mb-8 uppercase text-sm tracking-widest">Select Topology</p>
          
          <div className="flex flex-col gap-3">
            {DIFFICULTIES.map(diff => (
              <button 
                key={diff}
                onClick={() => startLevel(diff)}
                className={`
                  py-4 px-6 rounded-lg font-bold text-lg border-2 border-slate-900 
                  transition-all active:translate-y-1 active:shadow-none hover:-translate-y-1 hover:shadow-[4px_4px_0px_#0f172a]
                  ${diff === 'Medium' ? 'bg-amber-200 text-amber-900' : 'bg-slate-100 text-slate-700'}
                `}
              >
                {diff}
              </button>
            ))}
          </div>
          
          <div className="mt-8 text-center text-xs text-slate-400 font-mono">
            S.R.A.E. Engine // Isomorphic Generation
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#f1f5f9] font-sans flex flex-col overflow-hidden pb-20 md:pb-0">
      
      {/* HEADER DE CONTROLO */}
      <header className="bg-white border-b-2 border-slate-900 p-4 flex justify-between items-center z-10 shadow-sm shrink-0">
        <div className="flex items-center gap-4">
          <button onClick={() => setGameState('menu')} className="font-bold text-slate-600 hover:text-slate-900 flex items-center gap-2">
            <span className="text-xl">←</span> Murdoku
          </button>
          <span className="bg-slate-200 px-3 py-1 rounded font-bold text-xs text-slate-600 uppercase tracking-wide">
            {difficulty}
          </span>
        </div>
        <div className="flex gap-2">
          <button className="w-10 h-10 rounded border-2 border-slate-900 flex items-center justify-center font-bold text-xl hover:bg-slate-100 shadow-[2px_2px_0px_#0f172a] active:translate-y-0.5 active:shadow-[0px_0px_0px_#0f172a]">
            ?
          </button>
          <button className="w-10 h-10 rounded border-2 border-slate-900 flex items-center justify-center font-bold text-xl hover:bg-slate-100 shadow-[2px_2px_0px_#0f172a] active:translate-y-0.5 active:shadow-[0px_0px_0px_#0f172a]">
            ⚙
          </button>
        </div>
      </header>

      {/* ÁREA PRINCIPAL */}
      <main className="flex-1 flex flex-col md:flex-row p-4 gap-6 bg-slate-200 overflow-y-auto">
        
        {/* ESQUERDA: Bandeja de Suspeitos */}
        <section className="flex-1 max-w-sm flex flex-col">
          <div className="font-black text-2xl uppercase mb-4 text-slate-800 tracking-tighter">Suspects</div>
          <div className="flex-1 overflow-y-auto flex flex-col gap-4 pr-2">
            {levelData.entities.map(entity => {
              const isPlaced = placements[entity.id] !== undefined;
              const isSelected = selectedEntity === entity.id;

              return (
                <div 
                  key={entity.id}
                  onClick={() => handleTrayClick(entity.id)}
                  className={`
                    relative flex items-center p-3 bg-white border-4 border-black rounded-xl cursor-pointer
                    transition-transform duration-100
                    ${isPlaced ? 'opacity-40 grayscale scale-95 shadow-none' : 'shadow-[4px_4px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:translate-x-[-2px] hover:shadow-[6px_6px_0px_rgba(0,0,0,1)]'}
                    ${isSelected ? 'ring-4 ring-blue-500 scale-105 z-10' : ''}
                    ${entity.isVictim ? 'bg-rose-100' : ''}
                  `}
                >
                  <div className="h-16 w-16 shrink-0 mr-4">
                    <AvatarGraphic seed={entity.name.charCodeAt(0)} trait={entity.trait} />
                  </div>
                  <div className="flex-1">
                    <div className="font-black text-lg leading-none mb-1 text-black">{entity.name}</div>
                    <div className="text-sm font-bold text-slate-600 leading-tight">
                      {entity.clue.text}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>

        {/* CENTRO: Grelha do Jogo */}
        <section className="flex-[2] flex flex-col items-center justify-center relative min-w-[300px]">
          <div className="font-black text-2xl uppercase mb-4 text-slate-800 tracking-tighter">Crime Scene</div>
          <div 
            className="relative border-4 border-black bg-white shadow-[8px_8px_0px_rgba(0,0,0,1)] w-full max-w-2xl aspect-square"
            style={{
              display: 'grid',
              gridTemplateColumns: `repeat(${levelData.map.size}, 1fr)`,
              gridTemplateRows: `repeat(${levelData.map.size}, 1fr)`,
            }}
          >
            {/* Renderização das Células Individuais e Interatividade */}
            {Array.from({ length: levelData.map.size * levelData.map.size }).map((_, idx) => {
              const x = idx % levelData.map.size;
              const y = Math.floor(idx / levelData.map.size);
              const item = levelData.map.items.find(i => i.x === x && i.y === y);
              const occupantId = Object.keys(placements).find(id => placements[id].x === x && placements[id].y === y);
              const occupant = occupantId ? levelData.entities.find(e => e.id === occupantId) : null;
              
              const cellKey = `${x},${y}`;
              const isBlocked = blockedCells.has(cellKey);
              const cellNotes = notes[cellKey] || [];
              
              const room = getRoomAt(x, y, levelData.map);
              const rightRoom = getRoomAt(x + 1, y, levelData.map);
              const bottomRoom = getRoomAt(x, y + 1, levelData.map);
              
              const borderClasses = `
                ${rightRoom && rightRoom.id !== room?.id ? 'border-r-[4px] border-r-black' : 'border-r-[1px] border-r-black/20'}
                ${bottomRoom && bottomRoom.id !== room?.id ? 'border-b-[4px] border-b-black' : 'border-b-[1px] border-b-black/20'}
                ${x === 0 || (getRoomAt(x - 1, y, levelData.map) && getRoomAt(x - 1, y, levelData.map).id !== room?.id) ? 'border-l-[4px] border-l-black' : 'border-l-[1px] border-l-black/20'}
                ${y === 0 || (getRoomAt(x, y - 1, levelData.map) && getRoomAt(x, y - 1, levelData.map).id !== room?.id) ? 'border-t-[4px] border-t-black' : 'border-t-[1px] border-t-black/20'}
              `;
              
              const isRoomBottomLeft = room && room.rect.x === x && (room.rect.y + room.rect.h - 1) === y;

              return (
                <div 
                  key={idx}
                  onPointerDown={() => handlePointerDown(x, y)}
                  onPointerUp={() => handlePointerUp(x, y)}
                  onPointerLeave={handlePointerLeave}
                  onContextMenu={(e) => e.preventDefault()}
                  className={`relative flex items-center justify-center cursor-pointer transition-colors z-10 select-none ${borderClasses}`}
                  style={{ 
                    gridColumn: x + 1, 
                    gridRow: y + 1, 
                    touchAction: 'none',
                    backgroundColor: room ? ROOM_COLORS[room.id] : '#fff'
                  }}
                >
                  {/* Room Label Badge */}
                  {isRoomBottomLeft && (
                    <span 
                      className="absolute bottom-1 left-1.5 font-black text-white text-xs md:text-[14px] leading-tight tracking-widest z-0 pointer-events-none" 
                      style={{ WebkitTextStroke: '3px black', paintOrder: 'stroke fill' }}
                    >
                      {room.name.toUpperCase()}
                    </span>
                  )}
                  {/* Item Dinâmico */}
                  {item && <FurnitureIcon type={item.type} />}
                  
                  {/* Blocked "X" Overlay */}
                  {isBlocked && !occupant && (
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10 opacity-90 p-[15%]">
                      <svg viewBox="0 0 100 100" className="w-full h-full">
                        <path d="M 15 15 L 85 85 M 85 15 L 15 85" stroke="#000" strokeWidth="22" strokeLinecap="square" />
                      </svg>
                    </div>
                  )}

                  {/* Notes Overlay */}
                  {cellNotes.length > 0 && !occupant && !isBlocked && (
                    <div className="absolute inset-0 flex flex-wrap content-start justify-start gap-0.5 p-1 pointer-events-none z-10">
                      {cellNotes.map(id => {
                        const entity = levelData.entities.find(e => e.id === id);
                        const color = AVATAR_COLORS[entity.name.charCodeAt(0) % AVATAR_COLORS.length];
                        return (
                          <span key={id} className="font-black text-xl leading-none" style={{ color: color, WebkitTextStroke: '1px black' }}>
                            {entity.name.charAt(0)}
                          </span>
                        );
                      })}
                    </div>
                  )}

                  {/* Entidade Colocada */}
                  {occupant && (
                    <div className="absolute inset-1 shadow-[2px_2px_0px_rgba(0,0,0,1)] cursor-grab z-20 rounded border-2 border-black bg-white">
                      <AvatarGraphic seed={occupant.name.charCodeAt(0)} trait={occupant.trait} className={selectedEntity === occupant.id ? 'ring-4 ring-blue-500 scale-105 transition-transform' : ''} />
                    </div>
                  )}

                  {/* Indicador de Seleção Hover */}
                  {selectedEntity && !occupant && !isBlocked && (
                    <div className="absolute inset-2 border-4 border-dashed border-blue-500/50 rounded-lg opacity-0 hover:opacity-100 transition-opacity"></div>
                  )}
                </div>
              );
            })}
          </div>
        </section>

        {/* DIREITA: Controlos */}
        <section className="w-full md:w-48 flex flex-col gap-4">
          <div className="font-black text-2xl uppercase mb-0 md:mb-4 text-slate-800 tracking-tighter hidden md:block">Tools</div>
          
          <div className="flex flex-row md:flex-col gap-4">
            <button 
              onClick={handleClear}
              className="flex-1 py-4 bg-white hover:bg-slate-50 text-black font-black border-4 border-black rounded-xl shadow-[4px_4px_0px_rgba(0,0,0,1)] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex flex-col justify-center items-center gap-2"
            >
              <span className="text-3xl">🗑️</span> CLEAR ALL
            </button>
            <button 
              onClick={handleSubmit}
              className="flex-1 py-6 bg-blue-500 hover:bg-blue-400 text-white font-black text-xl tracking-widest border-4 border-black rounded-xl shadow-[4px_4px_0px_rgba(0,0,0,1)] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex flex-col justify-center items-center gap-2"
            >
              <span className="text-3xl">✅</span> SUBMIT
            </button>
          </div>
        </section>

        {/* OVERLAY DE VITÓRIA */}
        {gameState === 'victory' && (
          <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
            <div className="bg-white p-8 rounded-xl border-4 border-slate-900 shadow-[12px_12px_0px_rgba(0,0,0,1)] max-w-sm w-full text-center transform animate-bounce">
              <div className="text-6xl mb-4">🏆</div>
              <h2 className="text-3xl font-black text-slate-900 mb-2 uppercase">Solved!</h2>
              <p className="text-slate-500 font-bold mb-8">Topology validated successfully.</p>
              <button 
                onClick={() => setGameState('menu')}
                className="w-full py-4 bg-emerald-400 hover:bg-emerald-300 text-slate-900 font-black text-lg tracking-widest border-2 border-slate-900 rounded shadow-[4px_4px_0px_#0f172a] active:translate-y-1 active:shadow-none transition-all"
              >
                NEXT PUZZLE
              </button>
            </div>
          </div>
        )}

      </main>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<MurdokuApp />);
  </script>
</body>
</html>
